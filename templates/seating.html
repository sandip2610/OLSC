<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seating</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(to right, #eef2f3, #d9e4ec);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h2 {
            font-weight: bold;
            color: #333;
        }
        .card {
            border-radius: 2px;
            background: #fff;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        }
        .btn {
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            padding: 12px;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: #007bff;
            border: none;
        }
        .btn-primary:hover {
            background: #0056b3;
            transform: scale(1.05);
        }
        .btn-warning {
            background: #ffc107;
            border: none;
            color: #333;
        }
        .btn-warning:hover {
            background: #e0a800;
            color: #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
{% extends "base.html" %}
{% block title %}Smart School{% endblock %}
{% block content %}
<h2 class="text-center mb-4">Seating Page</h2>
<div class="container mt-5">
    <div class="card shadow-lg p-4">
        <div class="d-grid gap-2 mb-3">
            <a href="{% url 'edit_profile' student.id %}" class="btn btn-primary btn-lg">
                Edit Profile
            </a>
        </div>
        <div class="d-grid gap-2">
            <a href="{% url 'change_password' %}" class="btn btn-warning btn-lg">
                Change Password
            </a>
        </div>
    </div>
</div>
{% endblock %}
</body>
</html>
